<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guitar Chord Finder</title>
</head>
<body>
<div class="form-card">
  <div class="field">
    <label>သီချင်းနာမည်</label>
    <input id="song" type="text" placeholder="သီချင်းနာမည် ရိုက်ထည့်ပါ..." autocomplete="off">
  </div>

  <button id="search-btn" onclick="searchChords()">Chord ရှာမည်</button>
</div>

<script>
const WEBHOOK_URL = 'https://n8n.srv1695682.hstgr.cloud/webhook/guitar-chords';

function fillExample(song){
  document.getElementById('song').value = song;
}

async function searchChords(){
  const song = document.getElementById('song').value.trim();

  if(!song){
    alert('သီချင်းနာမည် ထည့်သွင်းပါ');
    return;
  }

  const res = await fetch(WEBHOOK_URL, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      song_title: song
    })
  });

  const data = await res.json();
  console.log(data);
}
</script>
</body>
</html>
